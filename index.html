<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>French Lab v3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .accent-btn { @apply bg-slate-100 p-2 rounded-xl text-sm font-bold w-12 h-12 flex items-center justify-center active:bg-blue-600 active:text-white transition-all shadow-sm; }
        ::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 100; @apply bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl text-sm font-bold flex items-center gap-3; }
        .card-btn { @apply w-full flex items-center gap-4 bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm active:scale-[0.98] transition-all; }
        .progress-bar { @apply h-1 bg-blue-500 transition-all duration-500 rounded-full; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 select-none">

    <div id="toast-container"></div>

    <div id="modal-overlay" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl animate-slide-up text-center">
            <h3 id="modal-title" class="text-xl font-black text-slate-900 mb-2">Notice</h3>
            <p id="modal-text" class="text-sm text-slate-500 mb-8 leading-relaxed"></p>
            <div class="flex flex-col gap-3">
                <button id="modal-confirm" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg">Okay</button>
                <button id="modal-cancel" class="w-full bg-slate-100 text-slate-500 font-bold py-4 rounded-2xl">Cancel</button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col p-4 pb-12">
        
        <header class="flex justify-between items-center mb-6 py-2">
            <div>
                <h1 class="text-2xl font-black text-blue-900 tracking-tight">French Lab</h1>
                <p class="text-[10px] text-blue-500 font-black uppercase tracking-[0.15em]">Version 3.2 • 2.5-Flash</p>
            </div>
            <button id="settings-trigger" class="bg-white shadow-md p-3 rounded-2xl border border-slate-100 active:rotate-45 transition-transform">⚙️</button>
        </header>

        <div id="view-menu" class="space-y-6">
            <div class="bg-blue-600 rounded-[2.5rem] p-6 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] font-black uppercase opacity-70 tracking-widest">Dictation Vault</p>
                            <h2 class="text-3xl font-black"><span id="vault-count">0</span> Items</h2>
                        </div>
                        <button id="refill-btn" class="bg-white/20 px-4 py-2 rounded-xl text-[10px] font-black uppercase backdrop-blur-md">Refill</button>
                    </div>
                    <button id="start-dictation" class="w-full bg-white text-blue-600 py-4 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-all">Start Dictation</button>
                </div>
                <div class="absolute -right-4 -bottom-4 text-8xl opacity-10 rotate-12 font-black">ABC</div>
            </div>

            <div class="bg-indigo-900 rounded-[2.5rem] p-6 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] font-black uppercase opacity-70 tracking-widest text-indigo-300">Listening Lab</p>
                            <h2 class="text-3xl font-black"><span id="listening-count">0</span> Stories</h2>
                        </div>
                        <button id="refill-listening-btn" class="bg-indigo-700 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Refill</button>
                    </div>
                    <button id="start-listening" class="w-full bg-indigo-500 text-white py-4 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-all">Start Listening</button>
                </div>
                <div class="absolute -right-4 -bottom-4 text-8xl opacity-20 rotate-12 font-black">🎧</div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">A1</p>
                    <p id="stats-a1" class="text-lg font-black text-emerald-500">--</p>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">A2</p>
                    <p id="stats-a2" class="text-lg font-black text-blue-500">--</p>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">B1</p>
                    <p id="stats-b1" class="text-lg font-black text-orange-500">--</p>
                </div>
            </div>

            <button id="go-review" class="card-btn">
                <div class="bg-orange-100 text-2xl w-14 h-14 rounded-2xl flex items-center justify-center">🔄</div>
                <div class="text-left"><p class="font-black text-slate-800">Review Room</p><p class="text-xs text-slate-500"><span id="review-count">0</span> items</p></div>
            </button>
        </div>

        <div id="view-listening" class="hidden space-y-4 flex-1">
            <div class="w-full bg-slate-200 h-1 rounded-full overflow-hidden mb-4"><div id="listen-progress" class="progress-bar" style="width: 0%"></div></div>
            <button class="exit-view text-xs font-black text-blue-600 uppercase mb-2">← Back</button>
            <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100 text-center">
                <div id="listen-level-tag" class="inline-block px-4 py-1.5 rounded-full bg-indigo-50 text-indigo-600 text-[10px] font-black uppercase mb-6 tracking-widest">A1</div>
                <h3 id="listen-topic" class="text-xl font-black text-slate-800 mb-6 italic">Topic</h3>
                <div class="flex flex-col gap-3 mb-8">
                    <button id="listen-play-btn" class="w-full bg-indigo-600 text-white font-black py-6 rounded-3xl shadow-xl text-xl">Play 🔊</button>
                    <button id="listen-turtle-btn" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl text-xs uppercase tracking-widest">Slow 🐢</button>
                </div>
                <div id="mcq-container" class="space-y-4 text-left"></div>
                <button id="submit-listening" class="w-full mt-8 bg-slate-900 text-white font-black py-5 rounded-3xl uppercase tracking-widest hidden">Check Answers</button>
            </div>
        </div>

        <div id="view-dictation" class="hidden space-y-4 flex-1">
            <div class="w-full bg-slate-200 h-1 rounded-full overflow-hidden mb-4"><div id="dict-progress" class="progress-bar" style="width: 0%"></div></div>
            <button class="exit-view text-xs font-black text-blue-600 uppercase mb-2">← Back</button>
            <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100 text-center">
                <div id="level-tag" class="inline-block px-4 py-1.5 rounded-full bg-blue-50 text-blue-600 text-[10px] font-black uppercase mb-6 tracking-widest">A1</div>
                <div class="flex flex-col gap-3 mb-8">
                    <button id="play-btn" class="w-full bg-blue-600 text-white font-black py-6 rounded-3xl shadow-xl text-xl">Listen 🔊</button>
                    <button id="turtle-btn" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl text-xs uppercase tracking-widest">Slow 🐢</button>
                </div>
                <textarea id="user-input" rows="3" placeholder="Tapez ici..." class="w-full p-6 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-[2rem] outline-none mb-6 resize-none font-medium leading-relaxed"></textarea>
                <div class="flex justify-center gap-2 mb-8 overflow-x-auto pb-2">
                    <button class="accent-btn">é</button><button class="accent-btn">à</button><button class="accent-btn">è</button><button class="accent-btn">ê</button><button class="accent-btn">ç</button><button class="accent-btn">ù</button>
                </div>
                <button id="check-btn" class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl uppercase tracking-widest shadow-lg">Verify</button>
            </div>
            <div id="result-area" class="hidden bg-white p-8 rounded-[3rem] border border-slate-200 shadow-2xl">
                <p id="score-display" class="text-6xl font-black text-center mb-6">0%</p>
                <div class="space-y-6">
                    <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100"><p class="text-[9px] font-black text-slate-400 uppercase mb-2">French</p><p id="correct-text" class="text-slate-900 font-bold leading-relaxed"></p></div>
                    <div class="p-5 bg-blue-50/50 rounded-2xl"><p class="text-[9px] font-black text-blue-400 uppercase mb-2">Translation</p><p id="translation-text" class="text-blue-700 italic font-medium"></p></div>
                </div>
                <button id="next-btn" class="w-full mt-8 bg-blue-600 text-white font-black py-5 rounded-3xl shadow-lg">Next →</button>
            </div>
        </div>

        <div id="view-settings" class="hidden fixed inset-0 bg-white z-50 p-8 flex flex-col">
            <h2 class="text-3xl font-black text-slate-900 mb-8">Settings</h2>
            <div class="space-y-4 flex-1 overflow-y-auto">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Gemini API Key</label>
                    <div class="flex gap-2">
                        <input type="password" id="api-key" placeholder="Key..." class="flex-1 p-5 bg-slate-50 rounded-2xl border border-slate-200 font-mono text-xs">
                        <button id="btn-test-api" class="bg-blue-100 text-blue-600 px-4 rounded-2xl font-black text-[10px] uppercase">Test</button>
                    </div>
                </div>
                <p class="text-[10px] font-black text-slate-400 uppercase ml-1">Management</p>
                <button id="btn-wipe-listening" class="w-full p-5 bg-indigo-50 text-indigo-700 rounded-2xl font-bold flex justify-between border border-indigo-100">Wipe Listening Lab <span>🗑️</span></button>
                <button id="btn-wipe-vault" class="w-full p-5 bg-orange-50 text-orange-700 rounded-2xl font-bold flex justify-between border border-orange-100">Wipe Dictation Vault <span>🗑️</span></button>
                <button id="btn-reset" class="w-full p-5 bg-red-50 text-red-700 rounded-2xl font-bold flex justify-between border border-red-100">Reset All Scores <span>📊</span></button>
            </div>
            <button id="save-settings" class="w-full bg-blue-600 text-white font-black py-5 rounded-[2rem] mt-4">Save & Close</button>
        </div>

        <footer class="mt-auto py-6 text-center">
            <p class="text-[9px] font-bold text-slate-300 uppercase tracking-[0.3em]">Build 2026.03.09 • Gemini 2.5 Flash</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let vault = JSON.parse(localStorage.getItem('french_vault') || '[]');
            let lVault = JSON.parse(localStorage.getItem('listening_vault') || '[]');
            let reviewRoom = JSON.parse(localStorage.getItem('review_vault') || '[]');
            let history = JSON.parse(localStorage.getItem('study_history') || '[]');
            let currentItem = null, isReviewMode = false, modalAction = null;
            let totalInSession = 0;

            const views = { menu: document.getElementById('view-menu'), dictation: document.getElementById('view-dictation'), listening: document.getElementById('view-listening'), settings: document.getElementById('view-settings') };

            const showToast = (msg) => {
                const toast = document.createElement('div');
                toast.className = 'toast animate-slide-up';
                toast.innerHTML = `<span>✨</span> ${msg}`;
                document.getElementById('toast-container').appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            };

            const showModal = (title, text, action, showCancel = true) => {
                document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-text').innerText = text;
                modalAction = action;
                document.getElementById('modal-cancel').classList.toggle('hidden', !showCancel);
                document.getElementById('modal-overlay').classList.remove('hidden');
            };

            const updateUI = () => {
                document.getElementById('vault-count').innerText = vault.length;
                document.getElementById('listening-count').innerText = lVault.length;
                document.getElementById('review-count').innerText = reviewRoom.length;
                ['A1', 'A2', 'B1'].forEach(lvl => {
                    const data = history.filter(h => h.level === lvl);
                    const avg = data.length ? Math.round(data.reduce((a, b) => a + b.score, 0) / data.length) + "%" : "--";
                    const el = document.getElementById(`stats-${lvl.toLowerCase()}`);
                    if(el) el.innerText = avg;
                });
                localStorage.setItem('french_vault', JSON.stringify(vault));
                localStorage.setItem('listening_vault', JSON.stringify(lVault));
                localStorage.setItem('review_vault', JSON.stringify(reviewRoom));
                localStorage.setItem('study_history', JSON.stringify(history));
            };

            const switchView = (t) => { Object.values(views).forEach(v => v.classList.add('hidden')); views[t].classList.remove('hidden'); };

            const sanitizeJSON = (raw) => {
                const start = raw.indexOf("[");
                const end = raw.lastIndexOf("]") + 1;
                if (start === -1 || end === 0) throw new Error("Invalid AI Response Format");
                return JSON.parse(raw.substring(start, end));
            };

            // REFILLS
            document.getElementById('refill-btn').onclick = async () => {
                const key = document.getElementById('api-key').value;
                if(!key) return showToast("API Key needed!");
                const btn = document.getElementById('refill-btn'); btn.innerText = "...";
                const prompt = `Generate 50 French sentences for A1, A2, B1. City life themes. JSON ONLY: [{"text": "...", "english": "...", "level": "A1/A2/B1"}]`;
                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }]}] })
                    });
                    const data = await resp.json();
                    vault = [...vault, ...sanitizeJSON(data.candidates[0].content.parts[0].text)];
                    updateUI(); showToast("Dictation Refilled!");
                } catch (e) { alert("Refill Error: " + e.message); }
                btn.innerText = "Refill";
            };

            document.getElementById('refill-listening-btn').onclick = async () => {
                const key = document.getElementById('api-key').value;
                if(!key) return showToast("API Key needed!");
                const btn = document.getElementById('refill-listening-btn'); btn.innerText = "...";
                const prompt = `Generate 10 short French listening exercises (A1-A2). JSON ONLY: [{"topic": "...", "transcript": "...", "level": "A1/A2", "questions": [{"q": "...", "options": ["A", "B", "C"], "correct": 0}]}]`;
                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }]}] })
                    });
                    const data = await resp.json();
                    lVault = [...lVault, ...sanitizeJSON(data.candidates[0].content.parts[0].text)];
                    updateUI(); showToast("Listening Refilled!");
                } catch (e) { alert("Listening Error: " + e.message); }
                btn.innerText = "Refill";
            };

            // TEST API
            document.getElementById('btn-test-api').onclick = async () => {
                const key = document.getElementById('api-key').value;
                if(!key) return showToast("Enter key first");
                const btn = document.getElementById('btn-test-api'); btn.innerText = "??";
                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: "hi" }]}] })
                    });
                    const data = await resp.json();
                    if(data.error) throw new Error(data.error.message);
                    showToast("Connection Successful!");
                } catch (e) { alert("Connection Failed: " + e.message); }
                btn.innerText = "Test";
            };

            // ENGINES
            const setupListening = () => {
                if(lVault.length === 0) return showToast("Vault Empty!");
                if(totalInSession === 0) totalInSession = 10;
                currentItem = lVault[0];
                document.getElementById('listen-progress').style.width = ((10 - lVault.length) / 10 * 100) + "%";
                document.getElementById('listen-level-tag').innerText = currentItem.level;
                document.getElementById('listen-topic').innerText = currentItem.topic;
                const container = document.getElementById('mcq-container');
                container.innerHTML = "";
                currentItem.questions.forEach((q, qIdx) => {
                    const qDiv = document.createElement('div');
                    qDiv.className = "p-4 bg-slate-50 rounded-2xl border border-slate-100 mb-2";
                    qDiv.innerHTML = `<p class="font-bold text-sm mb-3">${q.q}</p>`;
                    q.options.forEach((opt, oIdx) => {
                        const b = document.createElement('button');
                        b.className = "w-full text-left p-3 rounded-xl border border-white bg-white text-xs mb-2 active:bg-indigo-50 transition-colors";
                        b.innerText = opt;
                        b.onclick = () => {
                            qDiv.querySelectorAll('button').forEach(btn => btn.classList.remove('bg-indigo-600', 'text-white'));
                            b.classList.add('bg-indigo-600', 'text-white');
                            b.dataset.selected = oIdx;
                            if(document.querySelectorAll('[data-selected]').length === currentItem.questions.length) document.getElementById('submit-listening').classList.remove('hidden');
                        };
                        qDiv.appendChild(b);
                    });
                    container.appendChild(qDiv);
                });
                document.getElementById('submit-listening').classList.add('hidden');
                switchView('listening');
            };

            const setupDictation = (src) => {
                if(src.length === 0) return showToast("Vault Empty!");
                currentItem = src[0];
                document.getElementById('dict-progress').style.width = "50%"; // Simplified logic
                document.getElementById('level-tag').innerText = currentItem.level;
                document.getElementById('user-input').value = "";
                document.getElementById('result-area').classList.add('hidden');
                document.getElementById('check-btn').classList.remove('hidden');
                switchView('dictation');
            };

            // UTILS
            const playAudio = (text, rate) => {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text); u.lang = 'fr-FR'; u.rate = rate; window.speechSynthesis.speak(u);
            };

            document.getElementById('check-btn').onclick = () => {
                const input = document.getElementById('user-input').value.toLowerCase().replace(/[.,!?;:]/g, "").trim();
                const target = currentItem.text.toLowerCase().replace(/[.,!?;:]/g, "").trim();
                const score = input === target ? 100 : 0;
                history.push({ level: currentItem.level, score, date: new Date().toISOString() });
                document.getElementById('result-area').classList.remove('hidden');
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('score-display').innerText = score + "%";
                document.getElementById('correct-text').innerText = currentItem.text;
                document.getElementById('translation-text').innerText = currentItem.english;
                vault.shift(); updateUI();
            };

            document.getElementById('submit-listening').onclick = () => {
                const selected = document.querySelectorAll('[data-selected]');
                let correctCount = 0;
                selected.forEach((s, i) => { if(parseInt(s.dataset.selected) === currentItem.questions[i].correct) correctCount++; });
                const score = Math.round((correctCount / currentItem.questions.length) * 100);
                history.push({ level: currentItem.level, score, date: new Date().toISOString() });
                lVault.shift(); updateUI();
                showModal("Comprehension Score: " + score + "%", "Transcript: " + currentItem.transcript, () => setupListening());
            };

            // BINDINGS
            document.getElementById('start-listening').onclick = () => { totalInSession = 10; setupListening(); };
            document.getElementById('start-dictation').onclick = () => setupDictation(vault);
            document.getElementById('next-btn').onclick = () => setupDictation(vault);
            document.getElementById('play-btn').onclick = () => playAudio(currentItem.text, 0.85);
            document.getElementById('turtle-btn').onclick = () => playAudio(currentItem.text, 0.6);
            document.getElementById('listen-play-btn').onclick = () => playAudio(currentItem.transcript, 0.85);
            document.getElementById('listen-turtle-btn').onclick = () => playAudio(currentItem.transcript, 0.6);
            document.getElementById('modal-confirm').onclick = () => { if(modalAction) modalAction(); document.getElementById('modal-overlay').classList.add('hidden'); };
            document.getElementById('modal-cancel').onclick = () => document.getElementById('modal-overlay').classList.add('hidden');
            document.getElementById('settings-trigger').onclick = () => switchView('settings');
            document.getElementById('save-settings').onclick = () => { localStorage.setItem('gemini_api_key', document.getElementById('api-key').value); switchView('menu'); };
            document.querySelectorAll('.exit-view').forEach(b => b.onclick = () => switchView('menu'));
            document.querySelectorAll('.accent-btn').forEach(b => b.onclick = () => { document.getElementById('user-input').value += b.innerText; document.getElementById('user-input').focus(); });
            document.getElementById('btn-wipe-listening').onclick = () => { lVault = []; updateUI(); showToast("Wiped."); };
            document.getElementById('btn-wipe-vault').onclick = () => { vault = []; updateUI(); showToast("Wiped."); };
            document.getElementById('btn-reset').onclick = () => { history = []; updateUI(); showToast("Reset."); };

            const savedKey = localStorage.getItem('gemini_api_key');
            if(savedKey) document.getElementById('api-key').value = savedKey;
            updateUI();
        });
    </script>
</body>
</html>
