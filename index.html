<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dictée Pro v2.2.1</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .accent-btn { @apply bg-slate-100 p-2 rounded-xl text-sm font-bold w-12 h-12 flex items-center justify-center active:bg-blue-600 active:text-white transition-all shadow-sm; }
        ::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 100; @apply bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl text-sm font-bold flex items-center gap-3; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 select-none">

    <div id="toast-container"></div>

    <div id="modal-overlay" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl animate-slide-up">
            <h3 id="modal-title" class="text-xl font-black text-slate-900 mb-2 text-center">Are you sure?</h3>
            <p id="modal-text" class="text-sm text-slate-500 mb-8 text-center leading-relaxed font-medium"></p>
            <div class="flex flex-col gap-3">
                <button id="modal-confirm" class="w-full bg-red-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">Yes, Proceed</button>
                <button id="modal-cancel" class="w-full bg-slate-100 text-slate-500 font-bold py-4 rounded-2xl active:scale-95 transition-transform">Cancel</button>
            </div>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col p-4">
        
        <header class="flex justify-between items-center mb-6 py-2">
            <div>
                <h1 class="text-2xl font-black text-blue-900 tracking-tight">Dictée Pro</h1>
                <p class="text-[10px] text-blue-500 font-black uppercase tracking-[0.15em]">Foundation Edition (A1-B1)</p>
            </div>
            <button id="settings-trigger" class="bg-white shadow-md p-3 rounded-2xl border border-slate-100 active:rotate-45 transition-transform">⚙️</button>
        </header>

        <div id="view-menu" class="space-y-5">
            <div class="bg-blue-600 rounded-[2.5rem] p-8 text-white shadow-xl relative overflow-hidden mb-2">
                <div class="relative z-10">
                    <p class="text-xs font-bold uppercase opacity-70 mb-1">Sentence Vault</p>
                    <h2 class="text-4xl font-black mb-6 tracking-tight"><span id="vault-count">0</span> Items</h2>
                    <button id="refill-btn" class="bg-white text-blue-700 px-8 py-3 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-all">
                        Refill Vault
                    </button>
                </div>
                <div class="absolute -right-6 -bottom-6 text-[10rem] opacity-10 rotate-12">🇫🇷</div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">A1</p>
                    <p id="stats-a1" class="text-lg font-black text-emerald-500">--</p>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">A2</p>
                    <p id="stats-a2" class="text-lg font-black text-blue-500">--</p>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase mb-1">B1</p>
                    <p id="stats-b1" class="text-lg font-black text-orange-500">--</p>
                </div>
            </div>

            <div class="space-y-4 pt-2">
                <button id="start-dictation" class="w-full flex items-center gap-5 bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm active:bg-blue-50 transition-colors">
                    <div class="bg-emerald-100 text-2xl w-14 h-14 rounded-2xl flex items-center justify-center">🎧</div>
                    <div class="text-left"><p class="font-black text-slate-800">Start Session</p><p class="text-xs text-slate-500">Practice listening</p></div>
                </button>
                <button id="go-review" class="w-full flex items-center gap-5 bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm active:bg-orange-50 transition-colors">
                    <div class="bg-orange-100 text-2xl w-14 h-14 rounded-2xl flex items-center justify-center">🔄</div>
                    <div class="text-left"><p class="font-black text-slate-800">Review Room</p><p class="text-xs text-slate-500 font-medium"><span id="review-count">0</span> items</p></div>
                </button>
            </div>
        </div>

        <div id="view-dictation" class="hidden space-y-4 flex-1">
            <button class="exit-view text-xs font-black text-blue-600 uppercase mb-2 tracking-widest flex items-center gap-2">← Back</button>
            <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100 text-center">
                <div id="level-tag" class="inline-block px-4 py-1.5 rounded-full bg-blue-50 text-blue-600 text-[10px] font-black uppercase mb-6 tracking-widest">LEVEL</div>
                <div class="flex flex-col gap-3 mb-8">
                    <button id="play-btn" class="w-full bg-blue-600 text-white font-black py-6 rounded-3xl shadow-xl active:scale-[0.98] transition-all text-xl">Listen 🔊</button>
                    <button id="turtle-btn" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl text-xs uppercase tracking-widest">Slow 🐢</button>
                </div>
                <textarea id="user-input" rows="3" placeholder="Tapez ici..." class="w-full p-6 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-[2rem] outline-none mb-6 resize-none font-medium leading-relaxed"></textarea>
                <div class="flex justify-center gap-2 mb-8 overflow-x-auto pb-2">
                    <button class="accent-btn">é</button><button class="accent-btn">à</button><button class="accent-btn">è</button>
                    <button class="accent-btn">ê</button><button class="accent-btn">ç</button><button class="accent-btn">ù</button>
                </div>
                <button id="check-btn" class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl uppercase tracking-widest shadow-lg">Verify</button>
            </div>

            <div id="result-area" class="hidden bg-white p-8 rounded-[3rem] border border-slate-200 shadow-2xl">
                <p id="score-display" class="text-6xl font-black text-center mb-6">0%</p>
                <div class="space-y-6">
                    <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100">
                        <p class="text-[9px] font-black text-slate-400 uppercase mb-2">French</p>
                        <p id="correct-text" class="text-slate-900 font-bold leading-relaxed"></p>
                    </div>
                    <div class="p-5 bg-blue-50/50 rounded-2xl">
                        <p class="text-[9px] font-black text-blue-400 uppercase mb-2">Translation</p>
                        <p id="translation-text" class="text-blue-700 italic font-medium"></p>
                    </div>
                </div>
                <button id="next-btn" class="w-full mt-8 bg-blue-600 text-white font-black py-5 rounded-3xl shadow-lg">Next →</button>
            </div>
        </div>

        <div id="view-settings" class="hidden fixed inset-0 bg-white z-50 p-8 flex flex-col">
            <h2 class="text-3xl font-black text-slate-900 mb-8">Settings</h2>
            <div class="space-y-8 flex-1">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Gemini API Key</label>
                    <input type="password" id="api-key" placeholder="API Key..." class="w-full p-5 bg-slate-50 rounded-[1.5rem] outline-none border border-slate-200 focus:border-blue-500 font-mono text-xs">
                </div>
                <div class="space-y-3">
                    <p class="text-[10px] font-black text-slate-400 uppercase ml-1">Manage Data</p>
                    <button id="btn-wipe" class="w-full p-5 bg-orange-50 text-orange-700 rounded-2xl font-bold flex justify-between items-center border border-orange-100 active:scale-95 transition-transform">Wipe Vault (Keeps API) <span>🗑️</span></button>
                    <button id="btn-reset" class="w-full p-5 bg-red-50 text-red-700 rounded-2xl font-bold flex justify-between items-center border border-red-100 active:scale-95 transition-transform">Reset Scores <span>📊</span></button>
                </div>
            </div>
            <button id="save-settings" class="w-full bg-blue-600 text-white font-black py-5 rounded-[2rem] shadow-xl active:scale-95 transition-transform">Save & Close</button>
        </div>

        <footer class="mt-auto py-6 text-center">
            <p class="text-[9px] font-bold text-slate-300 uppercase tracking-[0.3em]">Version 2.2.1 • A1-B1 Foundation</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let vault = JSON.parse(localStorage.getItem('french_vault') || '[]');
            let reviewRoom = JSON.parse(localStorage.getItem('review_vault') || '[]');
            let history = JSON.parse(localStorage.getItem('study_history') || '[]');
            let currentSentence = null, isReviewMode = false, modalAction = null;

            const views = { menu: document.getElementById('view-menu'), dictation: document.getElementById('view-dictation'), settings: document.getElementById('view-settings') };

            const showToast = (msg) => {
                const toast = document.createElement('div');
                toast.className = 'toast animate-slide-up';
                toast.innerHTML = `<span>✨</span> ${msg}`;
                document.getElementById('toast-container').appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            };

            const showModal = (title, text, action) => {
                document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-text').innerText = text;
                modalAction = action;
                document.getElementById('modal-overlay').classList.remove('hidden');
            };

            const updateUI = () => {
                document.getElementById('vault-count').innerText = vault.length;
                document.getElementById('review-count').innerText = reviewRoom.length;
                ['A1', 'A2', 'B1'].forEach(lvl => {
                    const data = history.filter(h => h.level === lvl);
                    const avg = data.length ? Math.round(data.reduce((a, b) => a + b.score, 0) / data.length) + "%" : "--";
                    const el = document.getElementById(`stats-${lvl.toLowerCase()}`);
                    if(el) el.innerText = avg;
                });
                localStorage.setItem('french_vault', JSON.stringify(vault));
                localStorage.setItem('review_vault', JSON.stringify(reviewRoom));
                localStorage.setItem('study_history', JSON.stringify(history));
            };

            document.getElementById('refill-btn').onclick = async () => {
                const key = document.getElementById('api-key').value;
                if(!key) return showToast("Set API Key first!");
                const btn = document.getElementById('refill-btn');
                btn.disabled = true; btn.innerText = "Processing...";

                const prompt = `Generate 50 French sentences for beginners/intermediate (Levels: A1, A2, B1). 
                Focus: Daily life and basic exam prep. Output ONLY a JSON array: [{"text": "...", "english": "...", "level": "A1/A2/B1"}]`;

                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }]}] })
                    });
                    const data = await resp.json();
                    let raw = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                    vault = [...vault, ...JSON.parse(raw)];
                    updateUI();
                    showToast("Vault Stocked (A1-B1)!");
                } catch (e) { showToast("Refresh failed."); }
                btn.disabled = false; btn.innerText = "Refill Vault";
            };

            const setupSentence = (src) => {
                if(src.length === 0) { showToast("Vault Empty!"); return switchView('menu'); }
                currentSentence = src[Math.floor(Math.random() * src.length)];
                document.getElementById('level-tag').innerText = currentSentence.level;
                document.getElementById('user-input').value = "";
                document.getElementById('result-area').classList.add('hidden');
                document.getElementById('check-btn').classList.remove('hidden');
                playAudio();
            };

            const playAudio = (r = 0.85) => {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(currentSentence.text);
                u.lang = 'fr-FR'; u.rate = r; window.speechSynthesis.speak(u);
            };

            document.getElementById('check-btn').onclick = () => {
                const input = document.getElementById('user-input').value.toLowerCase().replace(/[.,!?;:]/g, "").trim();
                const target = currentSentence.text.toLowerCase().replace(/[.,!?;:]/g, "").trim();
                const wordsT = target.split(" "), wordsI = input.split(" ");
                let m = 0; wordsT.forEach((w, i) => { if(w === wordsI[i]) m++; });
                const score = Math.round((m / wordsT.length) * 100);

                history.push({ level: currentSentence.level, score, date: new Date().toISOString() });
                document.getElementById('result-area').classList.remove('hidden');
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('score-display').innerText = score + "%";
                document.getElementById('score-display').className = `text-6xl font-black text-center mb-6 ${score >= 80 ? 'text-emerald-500' : 'text-orange-500'}`;
                document.getElementById('correct-text').innerText = currentSentence.text;
                document.getElementById('translation-text').innerText = currentSentence.english || "No translation.";
                
                if(isReviewMode) { if(score >= 90) reviewRoom = reviewRoom.filter(s => s.text !== currentSentence.text); }
                else { vault = vault.filter(s => s.text !== currentSentence.text); if(score < 75) reviewRoom.push(currentSentence); }
                updateUI();
            };

            // SURGICAL WIPE (Ignores API Key)
            document.getElementById('btn-wipe').onclick = () => showModal("Wipe Vault?", "Clears sentences but keeps your API key safe.", () => { vault = []; updateUI(); showToast("Vault Cleared."); });
            document.getElementById('btn-reset').onclick = () => showModal("Reset Scores?", "Clears proficiency stats only.", () => { history = []; updateUI(); showToast("Stats Reset."); });
            
            document.getElementById('modal-confirm').onclick = () => { modalAction(); document.getElementById('modal-overlay').classList.add('hidden'); };
            document.getElementById('modal-cancel').onclick = () => document.getElementById('modal-overlay').classList.add('hidden');

            const switchView = (t) => { Object.values(views).forEach(v => v.classList.add('hidden')); views[t].classList.remove('hidden'); };
            document.getElementById('start-dictation').onclick = () => { isReviewMode = false; switchView('dictation'); setupSentence(vault); };
            document.getElementById('go-review').onclick = () => { isReviewMode = true; switchView('dictation'); setupSentence(reviewRoom); };
            document.getElementById('next-btn').onclick = () => setupSentence(isReviewMode ? reviewRoom : vault);
            document.getElementById('play-btn').onclick = () => playAudio(0.85);
            document.getElementById('turtle-btn').onclick = () => playAudio(0.55);
            document.getElementById('settings-trigger').onclick = () => switchView('settings');
            document.getElementById('save-settings').onclick = () => { localStorage.setItem('gemini_api_key', document.getElementById('api-key').value); switchView('menu'); showToast("Settings Saved"); };
            document.querySelectorAll('.exit-view').forEach(b => b.onclick = () => switchView('menu'));
            document.querySelectorAll('.accent-btn').forEach(b => b.onclick = () => { document.getElementById('user-input').value += b.innerText; document.getElementById('user-input').focus(); });

            const savedKey = localStorage.getItem('gemini_api_key');
            if(savedKey) document.getElementById('api-key').value = savedKey;
            updateUI();
        });
    </script>
</body>
</html>
