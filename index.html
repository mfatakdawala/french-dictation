<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>French Dictation</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/197/197560.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/197/197560.png">
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2563eb">
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center p-4 font-sans text-slate-800">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-6 mt-2 border border-slate-200 relative">
        <header class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-xl font-bold text-blue-800 tracking-tight">French Dictation</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Toronto Edition</p>
            </div>
            <button id="settings-btn" class="bg-slate-100 p-3 rounded-full flex items-center justify-center" style="min-width: 48px; min-height: 48px;">
                <span class="text-xl">⚙️</span>
            </button>
        </header>

        <div id="settings-area" class="hidden absolute top-16 left-0 right-0 mx-4 z-40 bg-white p-6 rounded-2xl border-2 border-blue-100 shadow-2xl space-y-4">
            <h2 class="font-bold text-blue-800 border-b pb-2">Settings</h2>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Gemini API Key</label>
                <input type="password" id="api-key" placeholder="Saved on device" class="w-full p-3 rounded-xl border border-slate-300 text-sm outline-none bg-slate-50">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase text-center">Length</label>
                    <select id="length" class="w-full p-2 bg-white border rounded-lg text-xs">
                        <option value="short">Short</option>
                        <option value="medium" selected>Medium</option>
                        <option value="long">Long</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase text-center">Speed</label>
                    <select id="speed" class="w-full p-2 bg-white border rounded-lg text-xs">
                        <option value="0.65">Slow</option>
                        <option value="0.85" selected>Normal</option>
                    </select>
                </div>
            </div>
            <button id="close-settings" class="w-full p-3 bg-blue-600 text-white rounded-xl text-sm font-bold uppercase">Save & Close</button>
        </div>

        <div class="flex justify-between items-center bg-blue-50 p-3 rounded-2xl mb-6 border border-blue-100">
            <div class="text-center flex-1">
                <p class="text-[10px] text-blue-400 font-bold uppercase leading-none">Avg Score</p>
                <p id="avg-score" class="text-lg font-black text-blue-700 leading-none mt-1">0%</p>
            </div>
            <div class="h-8 w-[1px] bg-blue-200 mx-2"></div>
            <div class="text-center flex-1">
                <p class="text-[10px] text-blue-400 font-bold uppercase leading-none">Count</p>
                <p id="count" class="text-lg font-black text-blue-700 leading-none mt-1">0</p>
            </div>
            <button id="reset-btn" class="ml-2 text-[9px] bg-white px-2 py-1 rounded-lg border border-blue-200 text-blue-500 font-bold uppercase">Reset</button>
        </div>

        <div class="space-y-4">
            <button id="main-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 text-lg">Get New Sentence</button>
            <div id="audio-controls" class="hidden flex gap-2">
                <button id="listen-btn" class="flex-1 bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-md">Listen 🔊</button>
                <button id="turtle-btn" class="px-5 bg-amber-400 text-white font-bold rounded-2xl shadow-md">Turtle 🐢</button>
            </div>
            <div id="input-area" class="hidden">
                <textarea id="user-input" rows="3" placeholder="Type what you hear..." class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-blue-500 outline-none mb-3 resize-none"></textarea>
                <button id="check-btn" class="w-full bg-orange-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 text-lg uppercase">Check Spelling</button>
            </div>
        </div>

        <div id="result-box" class="hidden mt-6 p-5 rounded-2xl border bg-slate-50 border-slate-200">
            <div id="score-text" class="text-4xl font-black text-center mb-2">0%</div>
            <div class="h-[1px] bg-slate-200 w-full mb-4"></div>
            <p id="correct-answer" class="text-sm italic text-slate-700 leading-relaxed text-center"></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let currentText = "";
            let sessionScores = [];

            // UI Elements
            const settingsBtn = document.getElementById('settings-btn');
            const settingsArea = document.getElementById('settings-area');
            const closeSettings = document.getElementById('close-settings');
            const apiKeyInput = document.getElementById('api-key');
            const mainBtn = document.getElementById('main-btn');
            const listenBtn = document.getElementById('listen-btn');
            const turtleBtn = document.getElementById('turtle-btn');
            const checkBtn = document.getElementById('check-btn');
            const resetBtn = document.getElementById('reset-btn');

            // Initialize API Key
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) apiKeyInput.value = savedKey;
            else settingsArea.classList.remove('hidden');

            // Event Listeners
            settingsBtn.onclick = () => settingsArea.classList.toggle('hidden');
            closeSettings.onclick = () => {
                localStorage.setItem('gemini_api_key', apiKeyInput.value.trim());
                settingsArea.classList.add('hidden');
            };
            
            resetBtn.onclick = () => {
                if(confirm("Reset stats?")) {
                    sessionScores = [];
                    updateStats();
                    document.getElementById('result-box').classList.add('hidden');
                }
            };

            mainBtn.onclick = async () => {
                const key = apiKeyInput.value;
                if(!key) return alert("Add API Key in settings!");
                
                mainBtn.disabled = true;
                mainBtn.innerText = "Generating...";
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: "Generate a B1 French sentence for dictation. No translation. Max 15 words." }]}] })
                    });
                    const data = await response.json();
                    currentText = data.candidates[0].content.parts[0].text.trim();
                    
                    document.getElementById('audio-controls').classList.remove('hidden');
                    document.getElementById('input-area').classList.remove('hidden');
                    document.getElementById('result-box').classList.add('hidden');
                    document.getElementById('user-input').value = "";
                    playAudio();
                } catch (e) { alert("API Error. Check your key."); }
                
                mainBtn.disabled = false;
                mainBtn.innerText = "Get New Sentence";
            };

            listenBtn.onclick = () => playAudio();
            turtleBtn.onclick = () => playAudio(0.55);
            checkBtn.onclick = () => {
                const userText = document.getElementById('user-input').value.trim();
                const score = calculateScore(currentText, userText);
                sessionScores.push(score);
                updateStats();
                showResult(score);
            };

            function playAudio(speed = null) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(currentText);
                u.lang = 'fr-FR';
                u.rate = speed || parseFloat(document.getElementById('speed').value);
                window.speechSynthesis.speak(u);
            }

            function updateStats() {
                const count = sessionScores.length;
                const avg = count ? Math.round(sessionScores.reduce((a,b)=>a+b,0)/count) : 0;
                document.getElementById('count').innerText = count;
                document.getElementById('avg-score').innerText = avg + "%";
            }

            function showResult(score) {
                const box = document.getElementById('result-box');
                const txt = document.getElementById('score-text');
                box.classList.remove('hidden');
                txt.innerText = score + "%";
                document.getElementById('correct-answer').innerText = currentText;
                txt.className = `text-4xl font-black text-center mb-2 ${score >= 80 ? 'text-emerald-500' : 'text-orange-500'}`;
                box.scrollIntoView({behavior:'smooth'});
            }

            function calculateScore(s1, s2) {
                const a = s1.toLowerCase().replace(/[.,!?;:]/g, "").trim();
                const b = s2.toLowerCase().replace(/[.,!?;:]/g, "").trim();
                let matches = 0;
                const wordsA = a.split(" ");
                const wordsB = b.split(" ");
                wordsA.forEach((w, i) => { if(w === wordsB[i]) matches++; });
                return Math.round((matches / wordsA.length) * 100);
            }
        });
    </script>
</body>
</html>
