<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>French Dictation</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/197/197560.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/197/197560.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        let currentText = "";
        let sessionScores = [];

        function toggleSettings() {
            const area = document.getElementById('settings-area');
            if (area) area.classList.toggle('hidden');
        }

        function saveKey() {
            const key = document.getElementById('api-key').value.trim();
            localStorage.setItem('gemini_api_key', key);
        }

        function resetStats() {
            if(confirm("Reset session progress?")) {
                sessionScores = [];
                updateStatsUI();
                document.getElementById('result-box').classList.add('hidden');
                document.getElementById('audio-controls').classList.add('hidden');
                document.getElementById('input-area').classList.add('hidden');
            }
        }

        function updateStatsUI() {
            const count = sessionScores.length;
            const avg = count === 0 ? 0 : Math.round(sessionScores.reduce((a, b) => a + b, 0) / count);
            document.getElementById('count').innerText = count;
            document.getElementById('avg-score').innerText = avg + "%";
        }

        async function generateDictation() {
            const key = document.getElementById('api-key').value;
            const length = document.getElementById('length').value;
            const btn = document.getElementById('main-btn');

            if(!key) {
                alert("Enter your Gemini API Key in Settings!");
                toggleSettings();
                return;
            }

            const wordCounts = { short: "8", medium: "12", long: "18" };
            const prompt = `Generate a B1 French sentence for dictation. Length: around ${wordCounts[length]} words. No translation. Only French text.`;

            btn.disabled = true;
            btn.innerText = "Generating...";
            
            const model = "gemini-2.5-flash"; 
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }]}] })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                currentText = data.candidates[0].content.parts[0].text.trim();

                document.getElementById('audio-controls').classList.remove('hidden');
                document.getElementById('input-area').classList.remove('hidden');
                document.getElementById('result-box').classList.add('hidden');
                document.getElementById('user-input').value = "";
                btn.disabled = false;
                btn.innerText = "Get New Sentence";
                playAudio();
            } catch (e) {
                alert("Error: " + e.message);
                btn.disabled = false;
                btn.innerText = "Try Again";
            }
        }

        function playAudio(overrideSpeed = null) {
            if(!currentText) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(currentText);
            utterance.lang = 'fr-FR';
            utterance.rate = overrideSpeed || parseFloat(document.getElementById('speed').value);
            window.speechSynthesis.speak(utterance);
        }

        function checkScore() {
            const userText = document.getElementById('user-input').value.trim();
            if(!userText) return;

            const score = calculateSimilarity(currentText, userText);
            sessionScores.push(score);
            updateStatsUI();

            const resultBox = document.getElementById('result-box');
            const scoreText = document.getElementById('score-text');
            resultBox.classList.remove('hidden');
            scoreText.innerText = score + "%";
            document.getElementById('correct-answer').innerText = currentText;

            if(score >= 90) scoreText.className = "text-4xl font-black text-center mb-2 text-emerald-500";
            else if(score >= 70) scoreText.className = "text-4xl font-black text-center mb-2 text-orange-500";
            else scoreText.className = "text-4xl font-black text-center mb-2 text-red-500";
            
            resultBox.scrollIntoView({ behavior: 'smooth' });
        }

        function calculateSimilarity(s1, s2) {
            const a = s1.toLowerCase().replace(/[.,!?;:]/g, "").trim();
            const b = s2.toLowerCase().replace(/[.,!?;:]/g, "").trim();
            if (a.length === 0) return 0;
            const dist = levenshtein(a, b);
            return Math.max(0, Math.round(((a.length - dist) / a.length) * 100));
        }

        function levenshtein(a, b) {
            const tmp = [];
            for (let i = 0; i <= a.length; i++) tmp[i] = [i];
            for (let j = 0; j <= b.length; j++) tmp[0][j] = j;
            for (let i = 1; i <= a.length; i++) {
                for (let j = 1; j <= b.length; j++) {
                    tmp[i][j] = Math.min(tmp[i-1][j]+1, tmp[i][j-1]+1, tmp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
                }
            }
            return tmp[a.length][b.length];
        }

        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if(savedKey) document.getElementById('api-key').value = savedKey;
            else toggleSettings();
            updateStatsUI();
        };
    </script>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center p-4 font-sans text-slate-800">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-6 mt-2 border border-slate-200 relative">
        <header class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-xl font-bold text-blue-800 tracking-tight">French Dictation</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none">Toronto Edition</p>
            </div>
            <button onclick="toggleSettings()" id="settings-btn" class="bg-slate-100 p-3 rounded-full flex items-center justify-center" style="min-width: 48px; min-height: 48px;">
                <span class="text-xl">⚙️</span>
            </button>
        </header>

        <div id="settings-area" class="hidden absolute top-16 left-0 right-0 mx-4 z-40 bg-white p-6 rounded-2xl border-2 border-blue-100 shadow-2xl space-y-4">
            <h2 class="font-bold text-blue-800 border-b pb-2">Settings</h2>
            <div>
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Gemini API Key</label>
                <input type="password" id="api-key" onchange="saveKey()" placeholder="Saved on device" class="w-full p-3 rounded-xl border border-slate-300 text-sm outline-none focus:border-blue-500 bg-slate-50">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase text-center">Length</label>
                    <select id="length" class="w-full p-2 bg-white border rounded-lg text-xs">
                        <option value="short">Short</option>
                        <option value="medium" selected>Medium</option>
                        <option value="long">Long</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase text-center">Speed</label>
                    <select id="speed" class="w-full p-2 bg-white border rounded-lg text-xs">
                        <option value="0.65">Slow</option>
                        <option value="0.85" selected>Normal</option>
                    </select>
                </div>
            </div>
            <button onclick="toggleSettings()" class="w-full p-3 bg-blue-600 text-white rounded-xl text-sm font-bold uppercase">Save & Close</button>
        </div>

        <div id="stats-bar" class="flex justify-between items-center bg-blue-50 p-3 rounded-2xl mb-6 border border-blue-100">
            <div class="text-center flex-1">
                <p class="text-[10px] text-blue-400 font-bold uppercase leading-none">Avg Score</p>
                <p id="avg-score" class="text-lg font-black text-blue-700 leading-none mt-1">0%</p>
            </div>
            <div class="h-8 w-[1px] bg-blue-200 mx-2"></div>
            <div class="text-center flex-1">
                <p class="text-[10px] text-blue-400 font-bold uppercase leading-none">Count</p>
                <p id="count" class="text-lg font-black text-blue-700 leading-none mt-1">0</p>
            </div>
            <button onclick="resetStats()" class="ml-2 text-[9px] bg-white px-2 py-1 rounded-lg border border-blue-200 text-blue-500 font-bold uppercase">Reset</button>
        </div>

        <div class="space-y-4">
            <button onclick="generateDictation()" id="main-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 text-lg">
                Get New Sentence
            </button>
            <div id="audio-controls" class="hidden flex gap-2">
                <button onclick="playAudio()" class="flex-1 bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-md active:scale-95">Listen 🔊</button>
                <button onclick="playAudio(0.55)" class="px-5 bg-amber-400 text-white
